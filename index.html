<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบคำนวณดอกเบี้ยและช่วยวิเคราะห์หนี้</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: "TH Sarabun New", Arial, sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        padding: 0;
        color: #1f2937;
    }
    .container {
        max-width: 980px;
        margin: 30px auto;
        background: #fff;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }
    h1 {
        text-align: center;
        color: #003366;
        margin-bottom: 24px;
    }
    h2 {
        color: #003366;
        border-bottom: 2px solid #003366;
        padding-bottom: 5px;
        margin-top: 24px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }
    input, select {
        width: 100%;
        padding: 10px;
        margin: 5px 0 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 16px;
    }
    button {
        background-color: #003366;
        color: white;
        border: none;
        padding: 10px 15px;
        margin: 5px 3px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
    }
    button:hover { background-color: #0055aa; }
    .button-secondary { background-color: #64748b; }
    .button-secondary:hover { background-color: #475569; }
    .result {
        margin-top: 15px;
        padding: 14px;
        background: #eef3ff;
        border-left: 5px solid #003366;
        border-radius: 8px;
        line-height: 1.7;
    }
    .help-box {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #dbe3ee;
        background: #fafafa;
        border-radius: 14px;
    }
    .section { margin-top: 10px; }
    .menu-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
    }
    .flow-card {
        margin-top: 16px;
        background: #ffffff;
        border: 1px solid #dbe3ee;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    }
    .flow-card h3 {
        margin: 0 0 10px;
        color: #0f172a;
    }
    .muted { color: #64748b; }
    .choice-row {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    .summary-box {
        background: #f8fbff;
        border: 1px solid #cfe0ff;
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 12px;
    }
    .summary-box.pink {
        background: #fff8fd;
        border-color: #f3c6e8;
    }
    .summary-box.blue {
        background: #f3f8ff;
        border-color: #b9d8ff;
    }
    ul {
        margin: 8px 0 0 18px;
        padding: 0;
        line-height: 1.7;
    }
    .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 8px;
    }
    .badge-fault { background: #dbeafe; color: #1d4ed8; }
    .badge-no-fault { background: #fce7f3; color: #be185d; }
    .law-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 12px;
        margin-top: 14px;
    }
    .law-item {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #dbe3ee;
        background: #fff;
    }
    .law-item strong {
        display: block;
        margin-bottom: 6px;
        color: #0f172a;
    }
    .law-item.blue-card {
        background: #f8fbff;
        border-color: #b9d8ff;
    }
    .law-item.pink-card {
        background: #fff8fd;
        border-color: #f3c6e8;
    }
    .law-note-red {
        margin-top: 12px;
        color: #dc2626;
        font-weight: bold;
        line-height: 1.6;
    }
    .inline-law-box {
        margin-top: 12px;
        padding: 12px 14px;
        background: #f8fbff;
        border: 1px solid #dbe3ee;
        border-radius: 12px;
        line-height: 1.7;
        display: flex;
        gap: 18px;
        align-items: flex-start;
        flex-wrap: wrap;
    }
    .inline-law-box .lead {
        color: #1f2937;
        min-width: 280px;
    }
    .inline-law-box .details {
        color: #1d4ed8;
        flex: 1;
        min-width: 280px;
    }
    .inline-law-box ul {
        margin: 0;
        padding-left: 20px;
    }
    .headline-box {
        margin-top: 12px;
        padding: 12px 14px;
        background: #f8fbff;
        border: 1px solid #dbe3ee;
        border-radius: 12px;
        line-height: 1.7;
        color: #1d4ed8;
    }
    @media (max-width: 640px) {
        .container { margin: 12px; padding: 16px; }
        button { width: 100%; margin: 4px 0; }
        .menu-buttons, .choice-row { display: block; }
        .inline-law-box {
            display: block;
        }
        .inline-law-box .lead,
        .inline-law-box .details {
            min-width: 0;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1>ระบบคำนวณดอกเบี้ยค้างขำระและช่วยวิเคราะห์ทางกฎหมาย</h1>

    <h2>ส่วนที่ 1: คำนวณดอกเบี้ย</h2>

    <label>เงินที่ค้างชำระ (บาท)</label>
    <input type="number" id="principal" placeholder="เช่น 100000">

    <label>อัตราดอกเบี้ยค้างชำระ (% ต่อปี)</label>
    <input type="number" id="rate" placeholder="เช่น 5">

    <label>จำนวนวันค้างชำระ</label>
    <input type="number" id="days" placeholder="เช่น 30">

    <button onclick="calculate()">คำนวณ</button>
    <div id="result" class="result"></div>

    <h2>ส่วนที่ 2: ระบบช่วยวิเคราะห์ทางกฎหมาย</h2>

    <button onclick="toggleHelp()">📘 เปิด/ปิด คำแนะนำ</button>

    <div id="helpBox" class="help-box" style="display:none;">
        <b>เลือกประเด็นกฎหมาย</b><br><br>
        <div class="menu-buttons">
            <button onclick="startCase(1)">1. ลูกหนี้ไม่ชำระหนี้</button>
            <button onclick="startCase(2)">2. เหตุการณ์หลังสัญญา</button>
            <button onclick="startCase(3)">3. การละเลยไม่ชำระหนี้</button>
            <button onclick="startCase(5)">4. การชำระล่าช้า</button>
        </div>
        <div id="helpContent" class="section"></div>
    </div>
</div>

<script>
function calculate() {
    const p = parseFloat(document.getElementById('principal').value);
    const r = parseFloat(document.getElementById('rate').value);
    const d = parseFloat(document.getElementById('days').value);

    if (isNaN(p) || isNaN(r) || isNaN(d) || p <= 0 || r < 0 || d < 0) {
        document.getElementById('result').innerHTML = 'กรุณากรอกข้อมูลให้ครบถ้วนและเป็นตัวเลขที่ถูกต้อง';
        return;
    }

    const interest = p * (r / 100) * (d / 365);
    const total = p + interest;

    document.getElementById('result').innerHTML =
        'ดอกเบี้ย = ' + interest.toFixed(2) + ' บาท<br>' +
        'รวม = ' + total.toFixed(2) + ' บาท';
}

function toggleHelp() {
    const box = document.getElementById('helpBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function renderHelp(title, description, bodyHtml, buttonsHtml = '') {
    const descriptionHtml = description ? `<div class="muted">${description}</div>` : '';
    document.getElementById('helpContent').innerHTML = `
        <div class="flow-card">
            <h3>${title}</h3>
            ${descriptionHtml}
            ${bodyHtml}
            <div class="choice-row">${buttonsHtml}</div>
        </div>
    `;
}

function resultCards(items, colorClass = 'blue-card') {
    return `
        <div class="law-grid">
            ${items.map(item => `<div class="law-item ${colorClass}"><strong>${item.title}</strong>${item.text || ''}</div>`).join('')}
        </div>
    `;
}

function startCase(type) {
    if (type === 1) {
        renderHelp(
            'ลูกหนี้ไม่ชำระหนี้',
            'ใช้สำหรับดูภาพรวมเมื่อมีการไม่ชำระหนี้ตามสัญญา',
            `
            <div class="summary-box blue">
                ประเด็นหลักที่มักต้องพิจารณา ได้แก่ การผิดนัด การเรียกให้ชำระหนี้ ดอกเบี้ยผิดนัด และสิทธิเรียกค่าเสียหาย
            </div>
            <ul>
                <li>ตรวจว่าหนี้ถึงกำหนดชำระแล้วหรือยัง</li>
                <li>ตรวจว่าลูกหนี้เป็นฝ่ายผิดหรือมีเหตุยกเว้นความรับผิด</li>
                <li>ตรวจว่ามีสิทธิเรียกดอกเบี้ยหรือค่าสินไหมทดแทนเพิ่มเติมหรือไม่</li>
            </ul>
            `,
            `<button onclick="startNeglectFlow()">การละเลยไม่ชำระหนี้</button> <button class="button-secondary" onclick="startLatePaymentFlow()">การชำระหนี้ล่าช้า</button>`
        );
    }

    if (type === 2) {
        startAfterContractFlow();
    }

    if (type === 3) {
        startNeglectFlow();
    }

    if (type === 4) {
        startReciprocalImpossibilityFlow();
    }

    if (type === 5) {
        startLatePaymentFlow();
    }
}


function startNeglectFlow() {
    renderHelp(
        'การละเลยไม่ชำระหนี้',
        '',
        `<div class="summary-box"><b>เลือกกรณี</b></div>`,
        `<button onclick="neglectPayableBranch()">กรณีอยู่ในวิสัยที่สามารถชำระได้</button>
         <button onclick="neglectEssentialTimeBranch()">กรณีล่วงเลยเวลาอันเป็นสาระสำคัญ</button>
         <button onclick="neglectHardshipBranch()">ลูกหนี้ยากลำบากในการชำระหนี้จะตกเป็นพ้นวิสัยหรือไม่</button>`
    );
}

function neglectPayableBranch() {
    renderHelp(
        'กรณีอยู่ในวิสัยที่สามารถชำระได้',
        '',
        `<div class="summary-box"><b>เลือกหัวข้อ</b></div>`,
        `<button onclick="neglectCriteria()">หลักเกณฑ์</button>
         <button onclick="neglectEffects()">หากลูกหนี้ไม่ชำระ เจ้าหนี้ทำอย่างไรได้บ้าง</button>
         <button class="button-secondary" onclick="startNeglectFlow()">กลับ</button>`
    );
}

function neglectCriteria() {
    renderHelp(
        'หลักเกณฑ์',
        '',
        resultCards([
            { title: 'หนี้ถึงกำหนด' },
            { title: 'ลูกหนี้จงใจประมาทไม่ชำระหนี้' },
            { title: 'ลูกหนี้ไม่ชำระหนี้เลย' }
        ], 'blue-card'),
        `<button class="button-secondary" onclick="neglectPayableBranch()">กลับ</button>`
    );
}

function neglectEffects() {
    renderHelp(
        'ผลของการไม่ชำระ',
        '',
        `<div class="summary-box"><b>เลือกฐานกฎหมาย</b></div>`,
        `<button onclick="neglectContractEffects()">ตามสัญญา</button>
         <button onclick="neglectDebtLawEffects()">ตามกม.ลักษณะหนี้</button>
         <button onclick="neglectContractTypeEffects()">ตามกม.ลักษณะสัญญา</button>
         <button class="button-secondary" onclick="neglectPayableBranch()">กลับ</button>`
    );
}

function neglectContractEffects() {
    renderHelp(
        'ตามสัญญา',
        '',
        `
        ${resultCards([
            { title: 'ริบมัดจำ', text: 'เจ้าหนี้มีสิทธิริบมัดจำ เมื่อลูกหนี้ได้วางมัดจำไว้' },
            { title: 'เรียกเบี้ยปรับ', text: 'จ้าหนี้มีสิทธิเรียกเบี้ยปรับ ในกรณีที่การไม่ชำระหนี้เงินเป็นเรื่องของการผิดนัดโดยไม่จำเป็นต้องมีการฟ้องร้อง หรือพิสูจน์ความเสียหาย' },
            { title: 'เลิกสัญญา', text: 'เจ้าหนี้อาจใช้สิทธิเลิกสัญญาตามข้อสัญญาได้เลย โดยไม่ต้องบอกกล่าวกำหนดเวลาก่อน' }
        ], 'blue-card')}
        <div class="law-note-red">*หากเจ้าหนี้เลือกใช้สิทธิเรียกเบี้ยปรับ หรือยกเลิกสัญญาแล้ว จะไม่สามารถฟ้องศาลตามกฎหมายลักษณะหนี้ได้อีก</div>
        `,
        `<button class="button-secondary" onclick="neglectEffects()">กลับ</button>`
    );
}

function neglectDebtLawEffects() {
    renderHelp(
        'ตามกม.ลักษณะหนี้',
        '',
        `<div class="summary-box"><b>เลือกผลทางกฎหมาย</b></div>`,
        `<button onclick="neglectForcePerformance()">บังคับชำระหนี้ ม.213</button>
         <button onclick="neglectDamages215()">เรียกค่าเสียหาย ม.215</button>
         <button class="button-secondary" onclick="neglectEffects()">กลับ</button>`
    );
}

function neglectForcePerformance() {
    renderHelp(
        'บังคับชำระหนี้ ม.213',
        '',
        `
        <div class="inline-law-box">
            <div class="details"><b>เจ้าหนี้สามารถฟ้องศาลเพื่อให้ศาลบังคับให้ลูกหนี้ชำระหนี้ได้</b></div>
        </div>
        `,
        `<button class="button-secondary" onclick="neglectDebtLawEffects()">กลับ</button>`
    );
}

function neglectOpenPerformance() {
    renderHelp(
        'สภาพหนี้เปิดช่อง',
        '',
        resultCards([
            { title: 'เงิน' },
            { title: 'ส่งมอบ' }
        ], 'blue-card'),
        `<button class="button-secondary" onclick="neglectForcePerformance()">กลับ</button>`
    );
}

function neglectClosedPerformance() {
    renderHelp(
        'สภาพหนี้ไม่เปิดช่อง',
        '',
        resultCards([
            { title: 'กระทำการ' },
            { title: 'นิติกรรม' },
            { title: 'งดเว้นกระทำ' }
        ], 'blue-card'),
        `<button class="button-secondary" onclick="neglectForcePerformance()">กลับ</button>`
    );
}

function neglectDamages215() {
    renderHelp(
        'เรียกค่าเสียหาย ม.215',
        '',
        `
        <div class="inline-law-box">
            <div class="details">
                <ul>
                    <li>เจ้าหนี้สามารถเรียกค่าเสียหายอย่างเดียว = เรียกแทนการชำระหนี้ได้ หรือ</li>
                    <li>เจ้าหนี้ฟ้องศาลสั่งบังคับชำระหนี้ และเรียกค่าเสียหายอีกได้</li>
                </ul>
            </div>
        </div>
        `,
        `<button class="button-secondary" onclick="neglectDebtLawEffects()">กลับ</button>`
    );
}

function neglectContractTypeEffects() {
    renderHelp(
        'ตามกม.ลักษณะสัญญา',
        '',
        resultCards([
    { 
        title: `บอกเลิกตามหลักทั่วไป
1. กรณีลูกหนี้ไม่ชำระหนี้ เจ้าหนี้ต้องบอกกล่าวให้ลูกหนี้ชำระหนี้ภายในเวลาอันสมควรก่อน เมื่อลูกหนี้ไม่ชำระหนี้ เจ้าหนี้จึงมีสิทธิบอกเลิกสัญญาได้ (มาตรา 387)
2. กรณีเป็นหนี้ที่มีกำหนดเวลาในการชำระหนี้เป็นสาระสำคัญ หากลูกหนี้ไม่ชำระหนี้ภายในกำหนดเวลา เจ้าหนี้มีสิทธิบอกเลิกสัญญาโดยไม่ต้องบอกกล่าวลูกหนี้ (มาตรา 388)`
    }
], 'blue-card')
        `<button class="button-secondary" onclick="neglectEffects()">กลับ</button>`
    );
}

function neglectEssentialTimeBranch() {
    renderHelp(
        'กรณีล่วงเลยเวลาอันเป็นสาระสำคัญ',
        '',
        resultCards([
            { title: 'ไม่บังคับชำระหนี้ตาม ม.213', text: 'แต่เรียกค่าสินไหมทดแทนจากการไม่ชำระหนี้ตาม ม.215' },
            { title: 'ใช้สิทธิบอกเลิกสัญญาได้ทันที', text: 'ตาม ม.388' }
        ], 'pink-card'),
        `<button class="button-secondary" onclick="startNeglectFlow()">กลับ</button>`
    );
}

function neglectHardshipBranch() {
    renderHelp(
        'ความยากลำบากในการชำระหนี้',
        '',
        `<div class="summary-box"><b>เลือกหัวข้อ</b></div>`,
        `<button onclick="neglectHardshipNature()">ลักษณะ</button>
         <button onclick="neglectHardshipTypes()">ประเภท</button>
         <button class="button-secondary" onclick="startNeglectFlow()">กลับ</button>`
    );
}

function neglectHardshipNature() {
    renderHelp(
        'ลักษณะ',
        '',
        resultCards([
            { title: 'หนี้อยู่ในวิสัยที่จะชำระได้', text: 'แต่ถ้าชำระลูกหนี้รับภาระมากขึ้น' }
        ], 'pink-card'),
        `<button class="button-secondary" onclick="neglectHardshipBranch()">กลับ</button>`
    );
}

function neglectHardshipTypes() {
    renderHelp(
        'ประเภท',
        '',
        resultCards([
            { title: 'ภาระจากความเสี่ยงปกติจากธุรกิจ', text: 'ไม่ตกเป็นพ้นวิสัย' },
            { title: 'ภาระพิเศษ เช่น ภัยพิบัติรุนแรง สงคราม', text: 'ไม่ตกเป็นพ้นวิสัย' }
        ], 'pink-card'),
        `<button class="button-secondary" onclick="neglectHardshipBranch()">กลับ</button>`
    );
}

function startLatePaymentFlow() {
    renderHelp(
        'การชำระหนี้ล่าช้า',
        '',
        `<div class="summary-box"><b>เลือกลักษณะกรณี</b></div>`,
        `<button onclick="lateFaultBranch()">ลูกหนี้ผิด</button>
         <button onclick="lateNoFaultBranch()">ลูกหนี้ไม่ผิด</button>`
    );
}

function lateFaultBranch() {
    renderHelp(
        'ลูกหนี้ผิด',
        '',
        `
        <span class="badge badge-fault">แขนงผิด</span>
        ${resultCards([
            { title: 'ลูกหนี้จงใจหรือประมาท ไม่ชำระหนี้ตามเวลา' },
            { title: 'ลูกหนี้ผิดนัด ม.204' }
        ], 'blue-card')}
        `,
        `<button onclick="lateFaultDefaultMethod()">วิธีทำให้ผิดนัด</button>
         <button onclick="lateFaultEffects()">ผลที่เกิดขึ้นจากการผิดนัด</button>
         <button class="button-secondary" onclick="startLatePaymentFlow()">กลับ</button>`
    );
}

function lateFaultDefaultMethod() {
    renderHelp(
        'วิธีทำให้ผิดนัด',
        '',
        resultCards([
            { title: 'เมื่อเจ้าหนี้เตือน ว.1' },
            { title: 'ไม่ได้มีการชำระ ถ้ามีกำหนดเวลาปฏิทิน ว.2' }
        ], 'blue-card'),
        `<button class="button-secondary" onclick="lateFaultBranch()">กลับ</button>`
    );
}
